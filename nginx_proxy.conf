# =========================================================================
# Nginx Configuration: Domestic Server Reverse Proxy to Singapore Backend
# =========================================================================
# File location on Domestic Server: /etc/nginx/conf.d/birdkingdom.conf

# Redirect HTTP to HTTPS (Required for production and App Store submission)
server {
    listen 80;
    server_name birdkingdom.xyz www.birdkingdom.xyz api.birdkingdom.xyz;
    
    # During MIIT/管局 Audit, keep HTTP enabled to return the compliance page.
    # After passing the audit, uncomment the line below to enforce SSL.
    # return 301 https://$host$request_uri;

    # Compliance Placeholder Page for Audit
    location / {
        root /var/www/birdkingdom;
        index index.html;
    }

    # Reverse Proxy for API during audit (if testing is required via IP)
    location /api/ {
        # Forward to Singapore Backend Server
        # Option A: Via Public IP (Fastest setup)
        proxy_pass http://47.84.177.155:8080;
        
        # Option B: Via Tailscale Private IP (Most secure, uncomment if configured)
        # proxy_pass http://100.71.65.58:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

server {
    listen 443 ssl;
    server_name birdkingdom.xyz www.birdkingdom.xyz api.birdkingdom.xyz;

    # SSL Certificate Configuration (Configure certificate files on your domestic server)
    ssl_certificate /etc/nginx/certs/birdkingdom.xyz.pem;
    ssl_certificate_key /etc/nginx/certs/birdkingdom.xyz.key;

    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # Compliance Placeholder Page for Audit
    location / {
        root /var/www/birdkingdom;
        index index.html;
    }

    # Reverse Proxy for API
    location /api/ {
        # Forward to Singapore Backend Server
        # Option A: Via Public IP
        proxy_pass http://47.84.177.155:8080;
        
        # Option B: Via Tailscale Private IP
        # proxy_pass http://100.71.65.58:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
