version: '3.8'

services:
  backend:
    build: .
    container_name: birdkingdom-swift
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=Chen_20040601
      - DB_NAME=bird_kingdom
      - DB_USE_SSL=false
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production-birdkingdom-2024
      - APP_DEV_MODE=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
