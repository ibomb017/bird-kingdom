version: '3.8'

services:
  backend:
    build:
      context: .
      network: host
    container_name: birdkingdom-swift
    restart: unless-stopped
    network_mode: "host"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DB_HOST=${DB_HOST:-127.0.0.1}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-Chen_20040601}
      - DB_NAME=${DB_NAME:-bird_kingdom}
      - DB_USE_SSL=${DB_USE_SSL:-false}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production-birdkingdom-2024}
      - APP_DEV_MODE=${APP_DEV_MODE:-false}
      - ALIYUN_OSS_ACCESS_KEY_ID=${ALIYUN_OSS_ACCESS_KEY_ID}
      - ALIYUN_OSS_ACCESS_KEY_SECRET=${ALIYUN_OSS_ACCESS_KEY_SECRET}
      - ALIYUN_OSS_ENDPOINT=${ALIYUN_OSS_ENDPOINT}
      - ALIYUN_OSS_BUCKET=${ALIYUN_OSS_BUCKET}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
