server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name api.birdkingdom.xyz;
    index index.html index.htm default.htm default.html;
    root /www/wwwroot/birdkingdom;

    # SSL Certificate Config
    ssl_certificate    /www/server/panel/vhost/cert/api.birdkingdom.xyz/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/api.birdkingdom.xyz/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;

    # Force HTTPS redirect (except for acme-challenge)
    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }

    # Let's Encrypt Verification path
    location /.well-known/ {
        root /www/wwwroot/java_node_ssl;
    }

    # ============ APP APIs -> Swift 8080 ============
    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============ Swift Static Uploads ============
    location ~ ^/(avatars|images|videos)/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log  /www/wwwlogs/api.birdkingdom.xyz.log;
    error_log  /www/wwwlogs/api.birdkingdom.xyz.error.log;
}
