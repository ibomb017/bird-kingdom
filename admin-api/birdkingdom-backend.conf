server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name birdkingdom.xyz;
    index index.html index.htm default.htm default.html;
    root /www/wwwroot/birdkingdom;
    include /www/server/panel/vhost/nginx/extension/birdkingdom-backend/*.conf;
    include /www/server/panel/vhost/nginx/well-known/birdkingdom-backend.conf;

    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    ssl_certificate    /www/server/panel/vhost/cert/birdkingdom-backend/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/birdkingdom-backend/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    error_page 497  https://$host$request_uri;

    include /www/server/panel/vhost/rewrite/birdkingdom-backend.conf;

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md|package.json|package-lock.json|\.env) {
        return 404;
    }

    location /.well-known/ {
        root /www/wwwroot/java_node_ssl;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    location = /.well-known/apple-app-site-association {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /privacy {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /terms {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /share {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ================================================================
    # ============ ADMIN APIs -> 按照优先级精确匹配 ============
    # ================================================================

    # ---------- 1. Stats -> Swift 8080 ----------
    location /api/admin/stats {
        rewrite ^/api/admin/stats(.*) /api/stats$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 2. Auth -> Swift 8080 ----------
    location /api/admin/auth {
        rewrite ^/api/admin/auth(.*) /api/auth$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 3. Splash -> Swift 8080 (native path) ----------
    location /api/admin/splash {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 4. System ----------
    # system/config -> Swift 8080
    location = /api/admin/system/config {
        rewrite ^/api/admin/system/config(.*) /api/system/config$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # system/admins -> NodeJS BackCode 3000
    location /api/admin/system/admins {
        rewrite ^/api/admin/system/admins(.*) /api/admin/admin/list$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
    # system/roles -> static mock
    location /api/admin/system/roles {
        default_type application/json;
        return 200 '{"code":0,"data":[{"code":"SUPER_ADMIN","name":"超级管理员","permissions":["ALL"]},{"code":"ADMIN","name":"管理员","permissions":["READ","WRITE"]}]}';
    }
    # system/login-logs -> static mock
    location /api/admin/system/login-logs {
        default_type application/json;
        return 200 '{"code":0,"data":{"content":[],"totalElements":0}}';
    }

    # ---------- 5. Users -> Node Admin API 3001 ----------
    location /api/admin/users {
        rewrite ^/api/admin/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 6. Bird Logs -> Node Admin API 3001 ----------
    location /api/admin/bird-logs {
        rewrite ^/api/admin/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 7. Forum (comments & reports) -> Node Admin API 3001 ----------
    location /api/admin/forum/comments {
        rewrite ^/api/admin/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/admin/forum/reports {
        rewrite ^/api/admin/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 8. Finance -> Node Admin API 3001 ----------
    location /api/admin/finance {
        rewrite ^/api/admin/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 9. Encyclopedia -> Node Admin API 3001 ----------
    location /api/admin/encyclopedia {
        rewrite ^/api/admin/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 10. Catch-All Admin -> Swift 8080 ----------
    # covers: /api/admin/birds, /api/admin/forum/posts, /api/admin/encyclopedia/foods, etc.
    location /api/admin {
        rewrite ^/api/admin/(.*) /api/$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============ ADMIN Frontend ============
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # ============ APP APIs -> Swift 8080 ============
    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log  /www/wwwlogs/birdkingdom-backend.log;
    error_log  /www/wwwlogs/birdkingdom-backend.error.log;
}
