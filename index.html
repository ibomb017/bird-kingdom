<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站建设中</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #495057;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            border: 1px solid #dee2e6;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #212529;
            font-weight: 500;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            color: #6c757d;
        }
        .divider {
            height: 1px;
            background-color: #dee2e6;
            margin: 1.5rem 0;
        }
        .footer {
            font-size: 0.85rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>网站建设中</h1>
        <p>本网站（birdkingdom.xyz）目前正在进行技术维护与系统调试，暂不对外提供访问服务。敬请期待！</p>
        <div class="divider"></div>
        <p class="footer">© 2026 birdkingdom.xyz 版权所有</p>
    </div>
</body>
</html>
