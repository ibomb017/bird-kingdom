server:
  port: 8081

spring:
  application:
    name: bird-kingdom-admin
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bird_kingdom}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:birdkingdomadmin2025secretkey1234567890abcdef}
  expiration: 86400000 # 24小时

# 日志配置
logging:
  level:
    com.birdkingdom.admin: DEBUG
    org.springframework.security: INFO
